<script>

      darkMode: 'class',

        extend: {
          colors: {
            brand: {

<style data-purpose="glassmorphism-and-grain">
    :root {
      --brand-glow: rgba(108, 43, 238, 0.3);
    }

    body {
      background-color: #050508;
      font-family: 'Space Grotesk', sans-serif;
      overflow-x: hidden;
    }

    /* Subtle grain overlay */
    .grain-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    .glass-nav {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Liquid Glass Button Effect */
    .liquid-glass-btn {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #6c2bee 0%, #2dd4bf 100%);
      transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow: 0 0 20px var(--brand-glow);
    }

    .liquid-glass-btn::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
      transition: all 0.6s ease;
      transform: translate(-100%, -100%);
    }

    .liquid-glass-btn:hover::before {
      transform: translate(0, 0);
    }

    .liquid-glass-btn:hover {
      box-shadow: 0 0 30px rgba(45, 212, 191, 0.4);
      transform: translateY(-2px);
    }

    /* Link Hover State */
    .nav-link {
      position: relative;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: -4px;
      left: 0;
      background: #6c2bee;
      transition: width 0.3s ease;
      box-shadow: 0 0 8px #6c2bee;
    }
    .nav-link:hover::after {
      width: 100%;
    }
  </style>
<style data-purpose="eyeball-styles">
    .eye-container {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .eye {
      width: 44px;
      height: 44px;
      background: #ffffff;
      border-radius: 50%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.1), 0 0 15px rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .pupil {
      width: 18px;
      height: 18px;
      background: #0f172a;
      border-radius: 50%;
      position: absolute;
      transition: transform 0.05s linear;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Small glint on the pupil */
    .pupil::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 4px;
      height: 4px;
      background: rgba(255,255,255,0.8);
      border-radius: 50%;
    }
  </style>
</head>
<body class="text-slate-200">

<script data-purpose="eye-tracking-logic">
    /**
     * Eye Tracking Script
     * Logic: Calculates the angle between the center of each eye and the mouse cursor,
     * then offsets the pupil along that vector.
     */
    document.addEventListener('mousemove', (e) => {
      const mouseX = e.clientX;
      const mouseY = e.clientY;

      const eyes = document.querySelectorAll('.eye');
      
      eyes.forEach(eye => {
        const pupil = eye.querySelector('.pupil');
        const rect = eye.getBoundingClientRect();
        
        // Find the center of the eye
        const eyeX = rect.left + rect.width / 2;
        const eyeY = rect.top + rect.height / 2;

        // Calculate angle between eye center and mouse
        const angle = Math.atan2(mouseY - eyeY, mouseX - eyeX);
        
        // Define distance pupil can travel (radius of eye - radius of pupil - small padding)
        const distance = 10; 
        
        const moveX = Math.cos(angle) * distance;
        const moveY = Math.sin(angle) * distance;
        
        // Update pupil position
        pupil.style.transform = `translate(${moveX}px, ${moveY}px)`;
      });
    });
  </script>
